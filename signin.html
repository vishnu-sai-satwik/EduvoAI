<!DOCTYPE html>
<html lang="en">
<head>
    <meta name='impact-site-verification' value='5c27657f-deb8-40cb-b380-8bab37136a89'>
    <link rel="icon" type="image/png" href="logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Eduvo AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Google tag (gtag.js) -->
     <script async src="https://www.googletagmanager.com/gtag/js?id=G-ECJB4EMM1X"></script>
     <script>
        window.dataLayer = window.dataLayer || [];

    <style>
        body {
            background-color: #0A0A0A;
            color: #EAEAEA;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- Aurora Background --- */
        .aurora-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; z-index: -1; overflow: hidden; }
        .aurora-glow { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.2; }
        .aurora-1 { width: 500px; height: 500px; background: #A3E635; top: -10%; left: -10%; animation: float 20s infinite linear -10s; }
        .aurora-2 { width: 400px; height: 400px; background: #60A5FA; bottom: -10%; right: -10%; animation: float 20s infinite linear -5s; }
        @keyframes float { 0% { transform: translate(0, 0); } 50% { transform: translate(40px, 60px); } 100% { transform: translate(0, 0); } }

        /* --- Glass Card --- */
        .glass-card {
            background-color: rgba(30, 30, 30, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* --- Inputs --- */
        .form-input {
            width: 100%;
            background-color: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            padding-right: 2.5rem; /* Space for eye icon */
            color: white;
            transition: all 0.3s;
        }
        .form-input:focus {
            outline: none;
            border-color: #A3E635;
            box-shadow: 0 0 0 3px rgba(163, 230, 53, 0.1);
        }

        /* --- Buttons --- */
        .btn-primary {
            width: 100%;
            background-image: linear-gradient(to right, #a3e635, #bef264);
            color: #0f172a;
            font-weight: 700;
            padding: 0.75rem;
            border-radius: 0.75rem;
            transition: all 0.3s;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(163, 230, 53, 0.3); }
        .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

        .btn-google {
            width: 100%;
            background-color: white;
            color: #1f2937;
            font-weight: 600;
            padding: 0.75rem;
            border-radius: 0.75rem;
            display: flex; align-items: center; justify-content: center; gap: 0.75rem;
            transition: all 0.3s; cursor: pointer;
        }
        .btn-google:hover { background-color: #f3f4f6; transform: translateY(-1px); }
        
        /* --- Toast --- */
        .toast {
            position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%);
            padding: 0.75rem 1.5rem; border-radius: 99px; z-index: 50;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55); white-space: nowrap;
        }
        .toast.show { bottom: 20px; }
        .toast.error { background-color: #EF4444; color: white; }
        .toast.success { background-color: #A3E635; color: #0f172a; }
        
        /* Eye Icon Button */
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            cursor: pointer;
            background: none;
            border: none;
            padding: 4px;
        }
        .toggle-password:hover { color: white; }
    </style>
</head>
<body>

    <div class="aurora-bg">
        <div class="aurora-glow aurora-1"></div>
        <div class="aurora-glow aurora-2"></div>
    </div>

    <header class="absolute top-0 left-0 w-full z-20 p-6">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold text-white hover:opacity-80 transition-opacity">Eduvo AI</a>
            <nav class="hidden md:flex gap-6 text-sm font-medium">
                <a href="index.html#how-it-works" class="text-gray-300 hover:text-white">How It Works</a>
                <a href="index.html#faq" class="text-gray-300 hover:text-white">FAQs</a>
            </nav>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center px-4 py-20 z-10">
        
        <div class="glass-card w-full max-w-md p-8">
            
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-white mb-2" id="page-title">Welcome Back</h1>
                <p class="text-gray-400" id="page-subtitle">Sign in to continue your journey</p>
            </div>

            <button id="google-btn" class="btn-google mb-6">
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                <span>Sign in with Google</span>
            </button>

            <div class="flex items-center gap-4 mb-6">
                <div class="h-px bg-white/10 flex-grow"></div>
                <span class="text-sm text-gray-500 font-medium">OR</span>
                <div class="h-px bg-white/10 flex-grow"></div>
            </div>

            <form id="auth-form" class="space-y-4">
                <div id="name-field-container" class="hidden">
                    <label class="block text-sm font-medium text-gray-300 mb-1">Full Name</label>
                    <input type="text" id="name-input" class="form-input" placeholder="John Doe">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Email Address</label>
                    <input type="email" id="email-input" class="form-input" placeholder="you@example.com" required>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Password</label>
                    <div class="relative">
                        <input type="password" id="password-input" class="form-input" placeholder="••••••••" required>
                        <button type="button" class="toggle-password" onclick="togglePassword()">
                            <svg id="eye-open" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                            <svg id="eye-closed" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" id="submit-btn" class="btn-primary">
                    Sign In
                </button>
            </form>

            <div class="text-center mt-6">
                <p class="text-gray-400 text-sm" id="toggle-text">
                    Don't have an account? 
                    <button type="button" id="toggle-btn" class="text-lime-400 font-semibold hover:underline ml-1">Sign Up</button>
                </p>
            </div>
        </div>
    </main>

    <footer class="container mx-auto px-6 py-8 text-center text-gray-400 z-10">
        <div class="flex justify-center gap-8 text-sm font-medium mb-2">
            <a href="legal.html#privacy" class="hover:text-lime-400 transition-colors">Privacy Policy</a>
            <a href="legal.html#terms" class="hover:text-lime-400 transition-colors">Terms of Use</a>
        </div>
        <p class="text-xs">&copy; 2025 Eduvo AI. All rights reserved.</p>
    </footer>

    <div id="toast" class="toast"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { 
            getAuth, 
            signInWithPopup, 
            GoogleAuthProvider, 
            createUserWithEmailAndPassword, 
            signInWithEmailAndPassword,
            updateProfile,
            onAuthStateChanged
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC3euFCtckrdkhxcwQw28PWooUoOycTSdU",
            authDomain: "pathfinder-ai-87d22.firebaseapp.com",
            projectId: "pathfinder-ai-87d22",
            storageBucket: "pathfinder-ai-87d22.firebasestorage.app",
            messagingSenderId: "254163992794",
            appId: "1:254163992794:web:d34104f34142acac5be5e3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'default-app-id';

        const form = document.getElementById('auth-form');
        const googleBtn = document.getElementById('google-btn');
        const emailInput = document.getElementById('email-input');
        const passwordInput = document.getElementById('password-input');
        const nameInput = document.getElementById('name-input');
        const nameContainer = document.getElementById('name-field-container');
        const submitBtn = document.getElementById('submit-btn');
        const toggleBtn = document.getElementById('toggle-btn');
        const pageTitle = document.getElementById('page-title');
        const pageSubtitle = document.getElementById('page-subtitle');
        const toggleText = document.getElementById('toggle-text');

        let isSignUp = false;

        // DYNAMIC REDIRECT PARSER
        const urlParams = new URLSearchParams(window.location.search);
        const redirectUrl = urlParams.get('redirect') || 'dashboard.html';
        
        let isInitialLoad = true;

        onAuthStateChanged(auth, (user) => {
            if (user && !user.isAnonymous) {
                if (isInitialLoad) {
                    window.location.href = redirectUrl;
                }
            }
            isInitialLoad = false;
        });

        toggleBtn.addEventListener('click', () => {
            isSignUp = !isSignUp;
            if (isSignUp) {
                pageTitle.textContent = "Create Account";
                pageSubtitle.textContent = "Start building your future today";
                nameContainer.classList.remove('hidden');
                submitBtn.textContent = "Create Account";
                toggleText.childNodes[0].textContent = "Already have an account? ";
                toggleBtn.textContent = "Sign In";
            } else {
                pageTitle.textContent = "Welcome Back";
                pageSubtitle.textContent = "Sign in to continue your journey";
                nameContainer.classList.add('hidden');
                submitBtn.textContent = "Sign In";
                toggleText.childNodes[0].textContent = "Don't have an account? ";
                toggleBtn.textContent = "Sign Up";
            }
        });

        // --- PASSWORD TOGGLE LOGIC (Global) ---
        window.togglePassword = function() {
            const input = document.getElementById('password-input');
            const eyeOpen = document.getElementById('eye-open');
            const eyeClosed = document.getElementById('eye-closed');
            
            if (input.type === "password") {
                input.type = "text";
                eyeOpen.classList.add('hidden');
                eyeClosed.classList.remove('hidden');
            } else {
                input.type = "password";
                eyeOpen.classList.remove('hidden');
                eyeClosed.classList.add('hidden');
            }
        }

        googleBtn.addEventListener('click', async () => {
            const provider = new GoogleAuthProvider();
            try {
                const result = await signInWithPopup(auth, provider);
                await saveUserToFirestore(result.user);
                showToast("Signed in successfully!", "success");
                setTimeout(() => window.location.href = redirectUrl, 1000);
            } catch (error) {
                console.error(error);
                showToast(getFriendlyErrorMessage(error.code), "error");
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = emailInput.value;
            const password = passwordInput.value;
            const name = nameInput.value;

            submitBtn.disabled = true;
            submitBtn.textContent = "Processing...";

            try {
                if (isSignUp) {
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    const user = userCredential.user;
                    if (name) await updateProfile(user, { displayName: name });
                    await saveUserToFirestore(user, name);
                    showToast("Account created! Redirecting...", "success");
                } else {
                    const userCredential = await signInWithEmailAndPassword(auth, email, password);
                    await saveUserToFirestore(userCredential.user);
                    showToast("Welcome back!", "success");
                }
                setTimeout(() => window.location.href = redirectUrl, 1000);
            } catch (error) {
                console.error(error);
                showToast(getFriendlyErrorMessage(error.code), "error");
                submitBtn.disabled = false;
                submitBtn.textContent = isSignUp ? "Create Account" : "Sign In";
            }
        });

        async function saveUserToFirestore(user, explicitName = null) {
            const userRef = doc(db, 'artifacts', appId, 'users', user.uid);
            const displayName = explicitName || user.displayName || "Scholar";
            const userData = {
                email: user.email,
                lastLogin: serverTimestamp(),
                displayName: displayName,
                photoURL: user.photoURL || null
            };
            await setDoc(userRef, userData, { merge: true });
        }

        function getFriendlyErrorMessage(errorCode) {
            switch (errorCode) {
                case 'auth/email-already-in-use': return "This email is already registered.";
                case 'auth/invalid-email': return "Please enter a valid email address.";
                case 'auth/user-not-found': return "No account found with this email.";
                case 'auth/wrong-password': return "Incorrect password.";
                case 'auth/popup-closed-by-user': return "Sign in was cancelled.";
                case 'auth/weak-password': return "Password should be at least 6 characters.";
                default: return "Authentication failed. Please try again.";
            }
        }

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast show ${type}`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
